<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIS Portfolio</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#0f172a;
      color:white;
    }

    header{
      text-align:center;
      padding:60px 20px;
      background:#1e293b;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      color:#cbd5e1;
    }

    .projects{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:40px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }

    .card h2{
      margin-top:0;
    }

    a{
      color:#38bdf8;
      text-decoration:none;
    }

    footer{
      text-align:center;
      padding:20px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>GIS Portfolio</h1>
  <p>GIS • Remote Sensing • Web Mapping</p>
</header>

<section class="projects">

  <div class="card">
    <h2>Flood Risk Mapping</h2>
    <p>Spatial analysis project using GIS tools.</p>
  </div>

  <div class="card">
    <h2>Land Use Classification</h2>
    <p>Remote sensing classification and visualization.</p>
  </div>

  <div class="card">
    <h2>Web GIS Dashboard</h2>
    <p>Interactive web mapping application.</p>
  </div>

</section>

<footer>
  © 2026 GIS Portfolio
</footer>

</body>
</html>
